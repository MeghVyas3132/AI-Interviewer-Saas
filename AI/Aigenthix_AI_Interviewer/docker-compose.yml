services:
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    depends_on:
      - ai-interviewer-frontend
      - assemblyai-ws-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - app-network

  ai-interviewer-frontend:
    build: .
    container_name: nextjs-app
    depends_on:
      - assemblyai-ws-proxy
    expose:
      - "9002"
    volumes:
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # ...other env vars...
      - NEXT_PUBLIC_WS_PROXY_URL=${NEXT_PUBLIC_WS_PROXY_URL:-ws://localhost/api/assemblyai/stream}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_TTS_MODEL=${OPENAI_TTS_MODEL:-gpt-4o-mini-tts}
      - OPENAI_TTS_VOICE=${OPENAI_TTS_VOICE:-marin}
      - OPENAI_TTS_VOICE_FEMALE=${OPENAI_TTS_VOICE_FEMALE:-}
      - OPENAI_TTS_VOICE_MALE=${OPENAI_TTS_VOICE_MALE:-}
      - OPENAI_TTS_RESPONSE_FORMAT=${OPENAI_TTS_RESPONSE_FORMAT:-mp3}
    restart: unless-stopped
    networks:
      - app-network

  assemblyai-ws-proxy:
    build: .
    command: node ws-proxy-server.js
    container_name: assemblyai-ws-proxy
    expose:
      - "9003"
    env_file:
      - .env
    environment:
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY}
      - ASSEMBLYAI_STREAMING_MODEL=${ASSEMBLYAI_STREAMING_MODEL:-universal-streaming-english}
      - ASSEMBLYAI_STREAMING_ENCODING=${ASSEMBLYAI_STREAMING_ENCODING:-pcm_s16le}
      - ASSEMBLYAI_FORMAT_TURNS=${ASSEMBLYAI_FORMAT_TURNS:-false}
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
