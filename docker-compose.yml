services:
  # Database Service
  postgres:
    image: postgres:15-alpine
    container_name: ai_interviewer_db
    environment:
      POSTGRES_USER: ai_interviewer_user
      POSTGRES_PASSWORD: ai_interviewer_password
      POSTGRES_DB: ai_interviewer_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_interviewer_user -d ai_interviewer_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Redis Service
  redis:
    image: redis:alpine
    container_name: ai_interviewer_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_interviewer_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ai_interviewer_user:ai_interviewer_password@postgres:5432/ai_interviewer_db
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:3001","http://localhost:9002","http://localhost:9004"]'
      SECRET_KEY: ${SECRET_KEY:-TQ4UwEiBQZGau0QX4czZbSsJJYu04XdzgSjS2Woh6nc=}
      ALGORITHM: HS256
      AI_SERVICE_URL: ${AI_SERVICE_URL}
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY}
      AI_SERVICE_MODEL: ${AI_SERVICE_MODEL}
      # Groq API for ATS analysis
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_API_KEYS: ${GROQ_API_KEYS:-}
      # Gemini API for fallback
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_KEYS: ${GEMINI_API_KEYS:-}
      # Internal API key for service-to-service communication
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

  # Frontend Service (HR Dashboard)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_interviewer_frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    networks:
      - app-network

  # Celery worker for background tasks (emails, imports, AI processing if needed)
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_interviewer_celery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ai_interviewer_user:ai_interviewer_password@postgres:5432/ai_interviewer_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-TQ4UwEiBQZGau0QX4czZbSsJJYu04XdzgSjS2Woh6nc=}
      AI_SERVICE_URL: ${AI_SERVICE_URL}
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY}
      # Groq API for question generation
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_API_KEYS: ${GROQ_API_KEYS:-}
    command: ["celery", "-A", "app.core.celery_config.celery_app", "worker", "-Q", "default,email_default,email_high,bulk_import", "-l", "info"]
    networks:
      - app-network

  # =============================================================================
  # Real-Time AI Insight Services (Human-AI-Assisted Interviews)
  # =============================================================================

  # Speech Analysis Service - Real-time STT and confidence scoring
  speech-service:
    build:
      context: ./services/speech-analysis
      dockerfile: Dockerfile
    container_name: ai_interviewer_speech
    environment:
      - PORT=8001
      - REDIS_URL=redis://redis:6379
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-internal-key-change-in-prod}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-base}
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  # Video Analysis Service - Head tracking, engagement scoring
  video-service:
    build:
      context: ./services/video-analysis
      dockerfile: Dockerfile
    container_name: ai_interviewer_video
    environment:
      - PORT=8002
      - REDIS_URL=redis://redis:6379
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-internal-key-change-in-prod}
    ports:
      - "8002:8002"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  # Fraud Detection Service - Multi-face, face switch, background voice
  fraud-service:
    build:
      context: ./services/fraud-detection
      dockerfile: Dockerfile
    container_name: ai_interviewer_fraud
    environment:
      - PORT=8003
      - REDIS_URL=redis://redis:6379
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-internal-key-change-in-prod}
    ports:
      - "8003:8003"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  # NLP Engine Service - Resume contradiction, skill verification
  nlp-service:
    build:
      context: ./services/nlp-engine
      dockerfile: Dockerfile
    container_name: ai_interviewer_nlp
    environment:
      - PORT=8004
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://ai_interviewer_user:ai_interviewer_password@postgres:5432/ai_interviewer_db
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-internal-key-change-in-prod}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
    ports:
      - "8004:8004"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # Insight Aggregator Service - Combines all ML insights
  insight-aggregator:
    build:
      context: ./services/insight-aggregator
      dockerfile: Dockerfile
    container_name: ai_interviewer_aggregator
    environment:
      - PORT=8005
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://ai_interviewer_user:ai_interviewer_password@postgres:5432/ai_interviewer_db
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-internal-key-change-in-prod}
    ports:
      - "8005:8005"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
